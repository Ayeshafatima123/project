{% extends 'base.html' %}
{% block content %}
<div class="max-w-7xl mx-auto px-4 py-12">
    <div class="bg-white rounded-2xl p-8 shadow-lg">
        <h1 class="text-4xl font-bold mb-6">Payment Dashboard</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-green-50 p-6 rounded-xl">
                <p class="text-gray-600">Balance</p>
                <p class="text-3xl font-bold text-green-600">${{ balance|floatformat:2 }}</p>
            </div>
            <div class="bg-blue-50 p-6 rounded-xl">
                <p class="text-gray-600">Total Earned</p>
                <p class="text-3xl font-bold text-blue-600">${{ total_earned|floatformat:2 }}</p>
            </div>
            <div class="bg-purple-50 p-6 rounded-xl">
                <p class="text-gray-600">Total Withdrawn</p>
                <p class="text-3xl font-bold text-purple-600">${{ total_withdrawn|floatformat:2 }}</p>
            </div>
        </div>
        <a href="{% url 'withdraw' %}" class="inline-block bg-green-600 hover:bg-green-700 text-white px-8 py-4 rounded-lg font-bold text-xl transition">
            <i class="fas fa-money-bill-wave mr-2"></i>Withdraw Now
        </a>
    </div>
</div>
{% endblock %}
